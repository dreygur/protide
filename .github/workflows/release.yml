name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-shm0-dev \
            libxcb-xfixes0-dev \
            libxcb-shape0-dev \
            libasound2-dev \
            libfontconfig-dev \
            libudev-dev \
            libegl1-mesa-dev \
            mesa-common-dev

      - name: Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Create release archive
        run: |
          ARCHIVE="protide-${{ github.ref_name }}-x86_64-linux"
          mkdir -p "$ARCHIVE"
          cp target/release/protide "$ARCHIVE/"
          cp -r crates/protide/assets "$ARCHIVE/"
          cp packaging/protide.desktop "$ARCHIVE/"
          cp packaging/install-desktop.sh "$ARCHIVE/"
          tar czf "${ARCHIVE}.tar.gz" "$ARCHIVE"

      - uses: softprops/action-gh-release@v2
        with:
          files: protide-*.tar.gz
          generate_release_notes: true
